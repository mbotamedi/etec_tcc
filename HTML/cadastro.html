<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jockey+One&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>CANTINA 3IRMÃOS</title>
</head>

<body>

    <div class="container">
        <div class="cadastro-login">
            <div class="header-title">
                <h2>Já é nosso Cliente?</h2>
                <div class="barra-laranja"></div>
            </div>
            <form>
                <div class="form-group">
                    <label for="text">Usuário:</label>
                    <input type="text" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required>
                </div>
                <div class="botao">
                    <button type="submit">Entrar</button>
                </div>
            </form>
            <p>Não tem conta? <a href="#">Cadastre-se</a></p>
        </div>
    </div>
</body>
<style>
 .barra-laranja {
  height: 4px;
  width: 0%;
  background-color: rgb(255, 157, 0); /* Cor laranja */
  margin-bottom: 16px; /* Espaço abaixo da barra */
  margin-top: -30px;
  transition: width 1s ease-in-out;
  animation: carregar 1s ease-in-out;
  animation-fill-mode: forwards;
}

@keyframes carregar {
  0% {
    width: 0%;
  }
  100% {
    width: 90%;
  }
}
    body {
        margin: 0;
        background-color: #DBBD77;
        /* Cor principal */
    }

    .botao {
        width: 110%;
    }

    label,
    a,
    p,
    button {
        font-family: "Inter", serif;
        font-weight: 500;
        color: #333333;
        /* Cor de texto */
    }

    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #FFFFFF;
        /* Cor de fundo */
    }

    .cadastro-login {
        background-color: #FFFFFF;
        /* Cor de fundo */
        padding: 20px;
        border: 1px solid #333333;
        /* Cor de borda */
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(185, 197, 10, 0.2);
        width: 400px;
        height: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .header-title>h2 {
        font-family: "Fredoka", serif;
        font-weight: 600;
        font-size: 40px;
        color: #333333;
        /* Cor de texto */
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 10px;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        height: 10px;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 15px;
        background-color: #FFFFFF;
        /* Cor de fundo */
    }

    button[type="submit"] {
        width: 100%;
        height: 40px;
        padding: 10px;
        background-color: rgb(255, 157, 0);
        /* Cor de botão */
        color: #FFFFFF;
        /* Cor de texto */
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: transform 0.2s ease-in-out, color 0.2s ease-in-out;
    }
    button[type="submit"]:hover{
        transform: scale(1.05);
    }

    button[type="submit"]:hover {
        background-color: rgb(255, 128, 0);
        /* Cor de botão hover */
    }
</style>

</html>
