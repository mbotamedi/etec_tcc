<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jockey+One&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="shortcut icon" href="../imgs/logo_copia01.png" type="image/x-icon">
    <title>Cantina Três Irmãos - Cadastre-se</title>
</head>

<body>

    <div class="container">
        <div class="cadastro-login">
            <div class="header-title">
                <h2>Cadastre-se</h2>
                <div class="barra-laranja"></div>
            </div>
            <div class="user-icon">
                <img src="../imgs/usuario-de-perfil.png" alt="" width="50px">
            </div>
            <form>
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>
               <!--<div class="form-group">
                    <label for="celular">Celular:</label>
                    <input type="tel" id="celular" name="celular" required pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}"
                        placeholder="(99) 99999-9999" maxlength="15" oninput="mascaraTelefone(this)">
                </div>--> 
                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required>
                </div>
                <div class="form-group">
                    <label for="confirmar-senha">Confirmar Senha:</label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" required>
                </div>
                <div class="botao">
                    <button type="submit">Cadastrar</button>
                </div>
            </form>
            <div class="information">
                <p>Já tem conta? <a href="../HTML/login.html">Entrar</a></p>
            </div>
        </div>
    </div>
</body>
<script>
    function mascaraTelefone(input) {
        var telefone = input.value.replace(/\D/g, '');
        input.value = telefone.replace(/(\d{2})(\d)/, '($1) $2')
            .replace(/(\d{5})(\d)/, '$1-$2');
    }
</script>

</html>
