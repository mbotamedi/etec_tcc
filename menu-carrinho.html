<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Shop Homepage - Start Bootstrap Template</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/inicio.css">
    <!--FONTS---->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jockey+One&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jockey+One&family=Oswald:wght@200..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Navigation-->
    <nav class="navbar" style="width: 100%; background-color: rgba(0, 0, 0, 0.791);">
        <div class="container-fluid px-4 px-lg-5">
            <div class="imagem col-2">
                <img src="imgs/logo_copia01.png" alt="" width="100px">
            </div>

            <div class="items col-5">
                <a href="index.html">INICIO</a>
                <a href="#">PEÇA AGORA</a>
                <a href="#">UNIDADES</a>
                <a href="#">SOBRE</a>
            </div>

            <div class="buy-actions">
                <a href="#" id="abrirModal">
                    <img src="imgs/User.png" alt="Usuário" width="30px">
                </a>

                <a href="#">
                    <img src="imgs/Shopping cart.png" alt="Carrinho" width="30px">
                </a>
            </div>
        </div>
    </nav>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar">
        <div class="cart">
            <h2>2 Itens no Carrinho</h2>

            <div class="cart-item">
                <span>Coxinha de Frango com Catupiry</span>
                <span>R$ 7,50</span>
            </div>

            <div class="cart-item">
                <span>Coca cola lata 350 ml</span>
                <span>R$ 10,00</span>
            </div>

            <div class="total">
                <p>Frete: R$ 0,00</p>
                <p>Desconto sobre o pedido: R$ 0,00</p>
                <p>Total: R$ 17,50</p>
            </div>

            <button class="finalizar">FINALIZAR</button>
        </div>
    </div>

    <!-- Footer-->
    <footer class="py-5 bg-dark">
        <div class="container">
            <p class="m-0 text-center text-white">Copyright &copy; WebSolution 2025</p>
        </div>
    </footer>
    <!-- Bootstrap core JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

    <!--------------SCRIPTS-------------->

    <script src="js/scripts.js"></script>
    <script src="js/dropDown-menu.js"></script>

    <!--------------SCRIPTS/-------------->

    <script>
        // Adicione o seguinte código ao seu JavaScript
        const cartSidebar = document.querySelector('.cart-sidebar');
        const cartButton = document.querySelector('#abrirModal');

        cartButton.addEventListener('click', () => {
            cartSidebar.classList.toggle('show');
        });
    </script>

    <style>
        /* Adicione o seguinte código ao seu CSS */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 300px;
            height: 100vh;
            background-color: #fff;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
            display: none;
        }

        .cart-sidebar.show {
            display: block;
        }

        .cart {
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .total {
            margin-top: 20px;
        }

        .finalizar {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .finalizar:hover {
            background-color: #3e8e41;
        }
    </style>

</body>
</html>
